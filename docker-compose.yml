# UIWiz — Docker Compose
#
# Before running:
#   1. cp .env.example .env                              # fill in all values
#   2. cp backend/config.properties.example backend/config.properties  # fill in values
#   3. Place your Firebase service account JSON at backend/firebase-service-account.json
#
# Start everything:
#   docker compose up --build

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uiwiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uiwiz_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount secrets from host — read-only, never baked into the image
      - ./backend/config.properties:/app/config.properties:ro
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uiwiz_celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      # Same secrets as the API server
      - ./backend/config.properties:/app/config.properties:ro
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars must be present at BUILD time — Next.js compiles
      # them into the JS bundle. Values are read from the root .env file
      # (or the shell environment) by Docker Compose at build time.
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    # Mount the env file for any server-side runtime variables (non-NEXT_PUBLIC_)
    env_file:
      - path: ./frontend/.env.local
        required: false
    container_name: uiwiz_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
